<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo_dark.png" />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Inter:wght@600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 🔥 SEO TITLE (VERY IMPORTANT) -->
    <title>
      Orlando Web Design for Small Businesses | Onoprichuk Web Studio
    </title>

    <!-- 🔥 META DESCRIPTION -->
    <meta
      name="description"
      content="Onoprichuk Web Studio builds modern, high-converting websites for small businesses in Orlando. Fast, affordable, and designed to grow your brand."
    />

    <!-- 🔥 KEYWORDS (not as powerful but still fine) -->
    <meta
      name="keywords"
      content="Orlando web design, small business website Orlando, affordable web designer Orlando, website design Florida"
    />

    <!-- 🔥 AUTHOR -->
    <meta name="author" content="Sergey Onoprichuk" />

    <!-- 🔥 OPEN GRAPH (social sharing preview) -->
    <meta property="og:title" content="Onoprichuk Web Studio" />
    <meta
      property="og:description"
      content="Modern websites for small businesses in Orlando."
    />
    <meta property="og:image" content="/preview.jpg" />
    <meta property="og:url" content="https://onoprichukwebstudio.com/" />
    <meta property="og:type" content="website" />

    <!-- 🔥 TWITTER PREVIEW -->
    <meta name="twitter:card" content="summary_large_image" />

    <!-- 🔥 INDEXING -->
    <meta name="robots" content="index, follow" />
  </head>

  <body>
    <!-- Netlify form (hidden, REQUIRED for forms to work) -->
    <form
      name="contact"
      method="POST"
      data-netlify="true"
      data-netlify-honeypot="bot-field"
      hidden
    >
      <input type="hidden" name="form-name" value="contact" />

      <p hidden>
        <label>Don’t fill this out: <input name="bot-field" /></label>
      </p>

      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="business" />
      <input type="url" name="website" />

      <select name="help">
        <option value="new-site">New website</option>
        <option value="redesign">Redesign or refresh</option>
        <option value="landing-page">Landing page</option>
        <option value="other">Something else</option>
      </select>

      <textarea name="message"></textarea>
    </form>

    <!-- React App Mount -->
    <div id="root"></div>

    <!-- Main React Entry -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
